services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex} -d ${POSTGRES_DB:-cortex}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cortex-net

  nomic-embed:
    build:
      context: .
      dockerfile: Dockerfile.mock-embed
    container_name: cortex-nomic-embed
    ports:
      - "11435:11435"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11435/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cortex-net

volumes:
  postgres-data:

networks:
  cortex-net:
    driver: bridge
